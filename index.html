<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日划线</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    background: #0d0d0d;
    color: #d0d0d0;
    width: 100%; height: 100%; overflow: hidden;
  }
  body { padding: 12px 14px; display: flex; flex-direction: column; }
  .label { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; margin-bottom: 8px; }
  .highlight {
    font-size: 13px; line-height: 1.65; color: #f0f0f0;
    padding-left: 8px; border-left: 2px solid rgba(102,126,234,0.6);
    display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical;
    overflow: hidden; text-overflow: ellipsis;
  }
  .meta {
    margin-top: 8px; flex-shrink: 0;
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .book-title {
    font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.5);
    max-width: 75%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .date { font-size: 9px; color: rgba(255,255,255,0.25); }
</style>
</head>
<body>
  <div class="label">📖 今日划线</div>
  <div class="highlight">据说，定期前来巡视的警官也对此有所察觉。哪怕有一个人积极介入，Blue没有户籍的事情就会暴露，从而可能得到保护。如此一来，海老塚就不会死，青梅案也可能不会发生了。</div>
  <div class="meta">
    <div class="book-title">Blue · [日]叶真中显</div>
    <div class="date">2026-04-25</div>
  </div>
</body>
</html>
