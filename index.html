<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日划线</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    font-family: -apple-system, "PingFang SC", "Noto Sans SC", sans-serif;
    background: #0d0d0d;
    color: #d0d0d0;
    width: 100%;
    min-height: 100vh;
  }
  body { padding: 16px; }
  .header {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header .count { font-size: 10px; color: rgba(255,255,255,0.25); }
  .item {
    padding: 12px 10px;
    border-left: 2px solid rgba(102,126,234,0.6);
    margin-bottom: 12px;
  }
  .item .text {
    font-size: 13px;
    line-height: 1.7;
    color: #e8e8e8;
    margin-bottom: 6px;
  }
  .item .meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .item .book-title {
    font-size: 10px;
    color: rgba(255,255,255,0.45);
    max-width: 75%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item .date { font-size: 9px; color: rgba(255,255,255,0.2); }
  .loading, .error { text-align: center; font-size: 12px; color: rgba(255,255,255,0.4); padding: 20px 0; }
</style>
</head>
<body>
  <div class="header">
    <span>📖 划线记录</span>
    <span class="count" id="count"></span>
  </div>
  <div id="content"><div class="loading">加载中...</div></div>
<script>
async function loadContent() {
  try {
    const res = await fetch('history.json?t=' + Date.now());
    if (!res.ok) throw new Error("fail");
    const history = await res.json();
    if (!history.length) throw new Error("empty");
    document.getElementById("count").textContent = history.length + " 条";
    let html = "";
    for (const item of history) {
      html += '<div class="item">';
      html += '<div class="text">' + (item.highlight || "") + '</div>';
      html += '<div class="meta">';
      html += '<div class="book-title">' + (item.title || "") + (item.author ? " · " + item.author : "") + '</div>';
      html += '<div class="date">' + (item.date || "") + '</div>';
      html += '</div></div>';
    }
    document.getElementById("content").innerHTML = html;
  } catch(e) {
    document.getElementById("content").innerHTML = '<div class="error">暂无内容</div>';
  }
}
loadContent();
</script>
<div style="text-align:center;padding:12px 0;"><a href="monthly-summary.html" style="color:rgba(102,126,234,0.8);font-size:11px;text-decoration:none;">📅 本月笔记摘要</a></div>
</body>
</html>
